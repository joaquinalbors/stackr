<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not Found — Apexa</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#0a0a0a;color:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.wrap{max-width:400px}
.logo{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:48px;color:#fff}
.logo span{color:#7c3aed}
.code{font-size:120px;font-weight:800;letter-spacing:-4px;color:#7c3aed;line-height:1;margin-bottom:16px}
h1{font-size:22px;font-weight:800;margin-bottom:8px}
p{font-size:14px;color:#666;line-height:1.6;margin-bottom:32px}
a{display:inline-block;background:#7c3aed;color:#fff;border-radius:99px;padding:14px 32px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;text-decoration:none;transition:all .2s}
a:hover{background:#6d28d9;transform:translateY(-2px)}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">apexa<span>.</span></div>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a href="/">Go Home</a>
</div>
</body>
</html>
